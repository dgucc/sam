<!DOCTYPE html>
<html>
<body>
    <h1>Test API - javascript</h1>

    <button onclick="fetchAPI()">Charger les données</button>
    <div>
        <pre id="json-data"></pre>
    </div>

    <script>
        function fetchAPI() {
            // L'URL du service REST à interroger
            fetch('http://localhost:8080/universities')
                .then(response => response.json()) // Convertir la réponse en JSON
                .then(data => {
                    // Afficher les universités
                    document.getElementById('json-data').innerHTML = JSON.stringify(data,null,3);
                    console.log(data);
                })
                .catch(error => {
                    console.error('Erreur :', error);
                });
                // F12 dans le browser > "Console" pour afficher plus de détails
        }
    </script>
</body>
</html>
